spring:
  application:
    name: registry
  profiles:
    default: ${ACTIVATED_PROPERTIES}
  cloud:
    config:
      fail-fast: false
      password: ${CONFIG_SERVICE_PASSWORD}
      username: user
  config:
    import: optional:configserver:${CONFIG_SERVER_URL}

eureka:
  instance:
    prefer-ip-address: true
  client:
    registerWithEureka: false
    fetchRegistry: false
    server:
      waitTimeInMsWhenSyncEmpty: 0
