server:
  port: 8080

spring:
  cloud:
    config:
      fail-fast: true
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        add-to-simple-url-handler-mapping: true
      routes:
        - id: openapi
          uri: http://localhost:${server.port}
          predicates:
            - Path=/v3/api-docs/**
          filters:
            - RewritePath=/v3/api-docs/(?<path>.*), /$\{path}/v3/api-docs

        - id: user-service
          uri: http://localhost:9001
          predicates:
            - Path=/user/**
          filters:
            - RewritePath=/user/(?<path>.*), /$\{path}

        - id: supplier-service
          uri: http://localhost:9002
          predicates:
            - Path=/supplier/**
          filters:
            - RewritePath=/supplier/(?<path>.*), /$\{path}

        - id: utility-service
          uri: http://localhost:9003
          predicates:
            - Path=/utility/**
          filters:
            - RewritePath=/utility/(?<path>.*), /$\{path}

        - id: organization-service
          uri: http://localhost:9004
          predicates:
            - Path=/organization/**
          filters:
            - RewritePath=/organization/(?<path>.*), /$\{path}

        - id: log-service
          uri: http://localhost:9006
          predicates:
            - Path=/log/**
          filters:
            - RewritePath=/log/(?<path>.*), /$\{path}

        - id: workflow-service
          uri: http://localhost:9007
          predicates:
            - Path=/workflow/**
          filters:
            - RewritePath=/workflow/(?<path>.*), /$\{path}

        - id: indent-service
          uri: http://localhost:9008
          predicates:
            - Path=/indent/**
          filters:
            - RewritePath=/indent/(?<path>.*), /$\{path}

        - id: storage-service
          uri: http://localhost:9009
          predicates:
            - Path=/storage/**
          filters:
            - RewritePath=/storage/(?<path>.*), /$\{path}

        - id: i18n-service
          uri: http://localhost:9010
          predicates:
            - Path=/i18n/**
          filters:
            - RewritePath=/i18n/(?<path>.*), /$\{path}

        - id: portal-service
          uri: http://localhost:9011
          predicates:
            - Path=/portal/**
          filters:
            - RewritePath=/portal/(?<path>.*), /$\{path}

        - id: configuration-service
          uri: http://localhost:9012
          predicates:
            - Path=/configuration/**
          filters:
            - RewritePath=/configuration/(?<path>.*), /$\{path}

        - id: report-service
          uri: http://localhost:9013
          predicates:
            - Path=/report/**
          filters:
            - RewritePath=/report/(?<path>.*), /$\{path}

        - id: payment-service
          uri: http://localhost:9014
          predicates:
            - Path=/payment/**
          filters:
            - RewritePath=/payment/(?<path>.*), /$\{path}

        - id: notification-service
          uri: http://localhost:9015
          predicates:
            - Path=/notification/**
          filters:
            - RewritePath=/notification/(?<path>.*), /$\{path}

        - id: tender-service
          uri: http://localhost:9016
          predicates:
            - Path=/tender/**
          filters:
            - RewritePath=/tender/(?<path>.*), /$\{path}

        - id: automation-service
          uri: http://localhost:9017
          predicates:
            - Path=/automation/**
          filters:
            - RewritePath=/automation/(?<path>.*), /$\{path}


  swagger-ui:
    urls:
      - name: user
        url: /v3/api-docs/user
      - name: supplier
        url: /v3/api-docs/supplier
      - name: organization
        url: /v3/api-docs/organization
      - name: utility
        url: /v3/api-docs/utility
      - name: log
        url: /v3/api-docs/log
      - name: workflow
        url: /v3/api-docs/workflow
      - name: indent
        url: /v3/api-docs/indent
      - name: storage
        url: /v3/api-docs/storage
      - name: i18n
        url: /v3/api-docs/i18n
      - name: portal
        url: /v3/api-docs/portal
      - name: configuration
        url: /v3/api-docs/configuration
      - name: payment
        url: /v3/api-docs/payment
      - name: notification
        url: /v3/api-docs/notification
      - name: tender
        url: /v3/api-docs/tender
      - name: automation
        url: /v3/api-docs/automation